<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StoreApp — удахгүй шинэчлэгдэнэ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #fff7ed, #fed7aa);
      color: #1a1a2e;
      text-align: center;
      padding: 24px;
    }
    .box {
      max-width: 420px;
      background: #fff;
      padding: 40px 32px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.08);
    }
    .logo {
      font-size: 48px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #f97316, #c2410c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    p {
      color: #6b7280;
      line-height: 1.6;
      margin-bottom: 20px;
    }
    a {
      display: inline-block;
      background: linear-gradient(135deg, #f97316, #ea580c);
      color: #fff;
      padding: 12px 24px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      box-shadow: 0 4px 20px rgba(249,115,22,0.35);
    }
    a:hover { transform: translateY(-1px); }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">🛒</div>
    <h1>StoreApp</h1>
    <p>Landing page удахгүй шинэчлэгдэнэ.<br/>Түр зуур системд шууд нэвтэрнэ үү.</p>
    <a href="https://ai.storeapp.us/seller/login.html">Нэвтрэх</a>
  </div>
</body>
</html>
